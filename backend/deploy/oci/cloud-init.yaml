#cloud-config
# Oracle Cloud free-tier VM bootstrap for Viewshed backend
# Paste as "Cloud-init script" when creating the instance (optional).

package_update: true
packages:
  - git
  - ca-certificates
  - curl
  - gnupg

runcmd:
  # Docker (Ubuntu)
  - |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
    apt-get update
    apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
    systemctl enable --now docker
    usermod -aG docker ubuntu || usermod -aG docker opc || true

  # Open firewall inside OS (OCI also needs NSG/Security List for 8000)
  - |
    if command -v ufw >/dev/null; then
      ufw allow OpenSSH || true
      ufw allow 8000/tcp || true
      ufw --force enable || true
    fi
    firewall-cmd --permanent --add-port=8000/tcp 2>/dev/null || true
    firewall-cmd --reload 2>/dev/null || true

final_message: "Viewshed host ready — clone repo and docker compose up"
