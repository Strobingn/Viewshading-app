# version required by Ubuntu 20.04 docker-compose 1.x
version: "3.3"

services:
  viewshed-backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - VIEWSHADE_UPLOAD_DIR=/app/uploads
    restart: unless-stopped
