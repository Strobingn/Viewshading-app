name: Build Android Debug APK (Viewshading-app)

# Boss: Run this from GitHub Actions tab for easy debug APK.
# 1. Go to repo > Actions tab
# 2. Select this workflow
# 3. Click 'Run workflow' (manual trigger)
# 4. Download APK from Artifacts after green check

on:
  push:
    branches: ['main']
  workflow_dispatch:  # Manual button - use this to build without pushing code

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: viewshading-app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
