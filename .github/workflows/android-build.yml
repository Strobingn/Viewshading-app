name: Android CI - Viewshading App

on:
  push:
  pull_request:
    branches: [main, master, grok]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Create secrets.properties
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        shell: bash
        run: |
          printf 'MAPS_API_KEY=%s\n' "${MAPS_API_KEY:-}" > secrets.properties
          if [ -z "${MAPS_API_KEY}" ]; then
            echo "WARNING: MAPS_API_KEY secret is empty or not set. Map will not load."
          else
            echo "MAPS_API_KEY secret was injected into secrets.properties"
          fi

      - name: Run backend regression tests
        run: python3 -m unittest discover -s backend/tests -v

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

      - name: Run Android lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: viewshading-debug-${{ github.ref_name }}-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Build unsigned Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: viewshading-release-unsigned-${{ github.ref_name }}-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Clean up secrets
        if: always()
        run: rm -f secrets.properties
