name: Build Android APK

on:
  push:
    branches: [ 'main', 'feature/*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # === GRADLE CACHING STRATEGIES ===
      - name: Setup Gradle with advanced caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true
          # Cache key includes gradle files for better invalidation
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Cache Android SDK (speeds up first runs significantly)
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/avd
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      # Cache NDK downloads (important for native/Vulkan builds)
      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ~/android-ndk
          key: ${{ runner.os }}-ndk-26

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: '26.1.10909125'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: viewshading-app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
