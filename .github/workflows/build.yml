name: Build Android APK

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
          ndk-version: '26.1.10909125'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create secrets.properties
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY || secrets.GOOGLE_MAPS_API_KEY }}
        shell: bash
        run: |
          printf 'MAPS_API_KEY=%s\n' "${MAPS_API_KEY:-}" > secrets.properties
          if [ -z "${MAPS_API_KEY}" ]; then
            echo "WARNING: MAPS_API_KEY secret is empty or not set. Map will not load."
          else
            echo "MAPS_API_KEY secret was injected into secrets.properties"
          fi

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: viewshading-app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Clean up secrets
        if: always()
        run: rm -f secrets.properties
